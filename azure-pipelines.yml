trigger: none

schedules:
- cron: "45 3 * * 1-5"
  displayName: Market Open Run
  branches:
    include:
    - main
  always: true

- cron: "*/15 4-9 * * 1-5"
  displayName: Intraday Run
  branches:
    include:
    - main
  always: true

- cron: "0 10 * * 1-5"
  displayName: Market Close Run
  branches:
    include:
    - main
  always: true

pool:
  name: stock-pool
  #vmImage: 'ubuntu-latest'

steps:

- script: |
    python --version
  displayName: Check Python
  
- script: |
    pip install yfinance pandas ta requests
  displayName: Install Dependencies

#- script: |
#    pip install ta
#  displayName: Install TA Library

#- script: |
#    pip install -r requirements.txt
#  displayName: Install Dependencies

- script: |
    python strategy_2.py
  displayName: Run NSE Strategy

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: 'output'
    artifactName: 'NSE-Reports'